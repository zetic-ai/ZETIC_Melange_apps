name: med_image_segmentation
description: "Demo C — on-device cardiac-ultrasound LV segmentation benchmark (ZETIC Melange)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zetic_mlange: ^1.8.1        # on-device inference
  image: ^4.3.0              # decode PNG + bilinear resize (live preprocess stat)
  device_info_plus: ^11.5.0  # device model / chip / OS for the benchmark row

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/clips/manifest.json
    - assets/clips/a4c/
    - assets/clips/apical_thrombus/
    - assets/clips/plax_mvp/
